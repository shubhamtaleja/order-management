# CodeBuild working directory = repository root.
# Supports: pom.xml at repo root, or projects/order-management/, or order-management/.
# Docker: enable "Privileged" on the CodeBuild project (required for docker build).
# Use build context `.` (current dir). Do NOT use `..` — that points at the parent folder and breaks the build.
version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    IMAGE_REPO_NAME: order-management
    
phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - java -version
      - mvn -version

  pre_build:
    commands:
      - echo Logging into Docker Hub...
      - docker login -u shubhamtaleja08 -p Shubh@1234
      - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - export REPOSITORY_URI=238599091011.dkr.ecr.us-east-1.amazonaws.com/order-management
      - export IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - echo "ECR target $REPOSITORY_URI"
      - echo Logging into ECR...
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$REPOSITORY_URI"

  build:
    commands:
      - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - export REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - export IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - mvn -B clean package
      - docker build -t order-management .
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:$IMAGE_TAG

  post_build:
    commands:
      - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - export REPOSITORY_URI=$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - export IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - echo Pushing image...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - printf '[{"name":"oms-container","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json

cache:
  paths:
    - "/root/.m2/**/*"
