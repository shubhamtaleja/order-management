spring.application.name=order-management
server.port=8080

# Database Connection URL (Change 'your_database_name' to your actual MySQL database)
spring.datasource.url=jdbc:mysql://localhost:3306/test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Database Credentials
spring.datasource.username=root
spring.datasource.password=root

# MySQL Driver Class
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configurations
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Run schema.sql (drops old tables) before Hibernate creates the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=false